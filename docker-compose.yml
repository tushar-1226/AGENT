version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: friday-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.2-3b-instruct:free}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LLM_MODE=${LLM_MODE:-hybrid}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - LOCAL_MODEL=${LOCAL_MODEL:-llama3.2:3b}
      - ENABLE_MULTI_MODEL=${ENABLE_MULTI_MODEL:-false}
      - USE_OPENROUTER_FALLBACK=${USE_OPENROUTER_FALLBACK:-true}
    volumes:
      # Persist SQLite databases
      - ./backend/users.db:/app/users.db
      - ./backend/chat_sessions.db:/app/chat_sessions.db
      - ./backend/projects.db:/app/projects.db
      - ./backend/tasks.db:/app/tasks.db
      - ./backend/analytics.db:/app/analytics.db
      - ./backend/dev_tools.db:/app/dev_tools.db
      # Persist uploads
      - ./backend/uploads:/app/uploads
      # Optional: Mount credentials for Google integration
      - ./backend/credentials.json:/app/credentials.json:ro
    networks:
      - friday-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: friday-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - friday-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  friday-network:
    driver: bridge

volumes:
  friday-data:

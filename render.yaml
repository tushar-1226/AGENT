services:
  - type: web
    name: friday-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: 8000
      - key: FRONTEND_URL
        sync: false
      - key: LLM_MODE
        value: cloud
    healthCheckPath: /health

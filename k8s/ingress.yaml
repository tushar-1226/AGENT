apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: friday-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - friday.example.com
    - api.friday.example.com
    secretName: friday-tls
  rules:
  - host: friday.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: friday-frontend
            port:
              number: 80
  - host: api.friday.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: friday-backend
            port:
              number: 8000

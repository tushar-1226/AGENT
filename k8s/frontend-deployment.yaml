apiVersion: apps/v1
kind: Deployment
metadata:
  name: friday-frontend
  labels:
    app: friday-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: friday-frontend
  template:
    metadata:
      labels:
        app: friday-frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: friday-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://friday-backend:8000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: friday-frontend
  labels:
    app: friday-frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: friday-frontend

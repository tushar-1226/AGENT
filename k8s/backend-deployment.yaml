apiVersion: apps/v1
kind: Deployment
metadata:
  name: friday-backend
  labels:
    app: friday-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: friday-backend
  template:
    metadata:
      labels:
        app: friday-backend
        tier: backend
    spec:
      containers:
      - name: backend
        image: friday-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: friday-secrets
              key: gemini-api-key
        - name: BACKEND_HOST
          value: "0.0.0.0"
        - name: BACKEND_PORT
          value: "8000"
        - name: ALLOWED_ORIGINS
          value: "https://friday.example.com,http://localhost:3000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: friday-backend-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: friday-backend
  labels:
    app: friday-backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: friday-backend
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: friday-backend-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
